<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#d91f5c">
    <title>Santaiin MP3 Offline</title>
    <style>
        :root {
            color-scheme: light dark;
            --accent: #d91f5c;
            --bg: #f5f7fb;
            --text: #172033;
            --muted: #687487;
            --surface: #fff;
            --border: #dde3ee;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --text: #edf2f7;
                --muted: #a8b3c7;
                --surface: #182131;
                --border: #2f3b50;
            }
        }
        * {
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font: 16px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(100%, 420px);
            padding: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
        }
        .icon {
            width: 52px;
            height: 52px;
            display: inline-grid;
            place-items: center;
            margin-bottom: 12px;
            color: #fff;
            background: var(--accent);
            border-radius: 14px;
            font-size: 28px;
            font-weight: 800;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 22px;
        }
        p {
            margin: 0 0 18px;
            color: var(--muted);
        }
        a {
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            color: #fff;
            background: var(--accent);
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <div class="icon">♪</div>
        <h1>Koneksi sedang offline</h1>
        <p>Halaman yang sudah pernah dibuka tetap bisa tampil dari cache. Sambungkan internet untuk mencari lagu terbaru.</p>
        <a href="/">Kembali ke Beranda</a>
    </main>
</body>
</html>
